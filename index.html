<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Melding ontvangsthal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="melding">
    <h1 id="titel"></h1>
    <p id="tekst"></p>
  </div>

  <script>
    fetch('bericht.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('titel').textContent = data.titel;
        document.getElementById('tekst').textContent = data.tekst;
      });
  </script>
</body>
</html>
